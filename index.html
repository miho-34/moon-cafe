<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
body {
  background: linear-gradient(135deg, #f5e6dc, #d6b8a8);
  text-align: center;
  margin-top: 50px;
}
h1 {
  margin-bottom: 30px;
  color: #4a3425;
  font-size: 40px;
  text-shadow: 0 2px 5px rgba(0,0,0,0.1);
    margin-top: 20px;
  margin-bottom: 20px;
}

p {
  font-size: 20px;
  color: #7a5a44;
  margin: 10px 0;
}
button {
  cursor: pointer;
  padding: 14px 34px;
  background: #6b4f3b;
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 20px;
  font-weight: 600;
  margin-top: 30px;
  transition: 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.16);
}
img {
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    width: 100%;
  max-width: 320px;
}
button:hover {
  background-color: #8b6a52;
  transform: scale(1.05);
}

button:active {
  transform: scale(0.98);
}
input { 
  width: 350px; 
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
a {
  text-decoration: none;
  display: inline-block;
  margin: 0 8px;
}
div {
  display: flex;
  justify-content: center;
  gap: 15px;
}
@media (max-width: 600px) {
  h1 {
    font-size: 32px;
  }

  p {
    font-size: 18px;
  }

  img {
    width: 90%;
    max-width: 320px;
  }

  button {
    width: 80%;
    max-width: 260px;
    font-size: 18px;
    padding: 14px 20px;
  }
}
</style>
</head>
<body>

<img src="cafe.webp">

<h1>Moon Cafe</h1>

<p> ほっとひと息つける、やさしい雰囲気のカフェ</p>
<p>営業時間 11:00〜19:00</p>
<p>おすすめ：カフェラテ / いちごケーキ</p>

</a>
</body>
</html>
