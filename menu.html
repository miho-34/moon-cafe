<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Moon Cafe Menu</title>
  <style>
    .menu-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  
  width: 340px;
  margin: 20px auto;
  transition: 0.3s;
}
.menu-box:hover {
  transform: translateY(-3px);
  transition: 0.3s;
}
    body {
      background: linear-gradient(135deg, #f5e6dc, #d6b8a8);
      text-align: center;
      margin-top: 50px;
      font-family: sans-serif;
    }

    h1 {     
  margin-bottom: 30px;
  color: #4a3425;
  font-size: 44px;
}

.menu-card {
  margin-top: 20px;
}

.btn {
  margin-top: 24px;
}
   .menu-card {
     background: white;
     padding: 10px;
     width: 90%;
     max-width: 360px;
     margin: 0 auto;
     border-radius: 20px;
     box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }
 .menu-item {
  display: flex;
  justify-content: space-between;
  margin: 18px 0;
      font-size: 20px;
      line-height: 1.8;
      color: #6b4f3b;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(0,0,0,0.12);
      transition: 0.2s;
      padding: 12px 0;
    }
    .menu-item:hover {
      background: rgba(0,0,0,0.04);
      transform: scale(1.02);
      border-radius: 10px;
    }
   .menu-img {
      width: 100%;
      max-width: 320px;
      border-radius: 20px;
      margin-bottom: 20px;
      }
   .menu-card {
      transition: 0.3s;
     box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
    

    .menu-card:hover {
      transform: translateY(-4px);
     box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
button {
  cursor: pointer;
  padding: 14px 34px;
  background: #6b4f3b;
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 20px;
  font-weight: 600;
  margin-top: 30px;
  transition: 0.3s;
  box-shadow: 0 4px 10px rgba(0,0,0,0.16);
}

    button:hover {
      transform: scale(1.05) translateY(-2px);
      opacity: 0.95;
      box-shadow: 0 6px 14px rgba(0,0,0,0.25);
      border-radius: 50px;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <h1>Moon Cafe Menu</h1>

<img src="cafe.webp" alt="cafe.webp" class="menu-img">

  <div class="menu-card">

  <div class="menu-item">
    <span>カフェラテ</span>
    <span>¥550</span>
  </div>

  <div class="menu-item">
    <span>カフェモカ</span>
    <span>¥600</span>
  </div>

  <div class="menu-item">
    <span>ブレンドコーヒー</span>
    <span>¥500</span>
  </div>

  <div class="menu-item">
    <span>いちごケーキ</span>
    <span>¥650</span>
  </div>

  <div class="menu-item">
    <span>チーズケーキ</span>
    <span>¥620</span>
  </div>

</div>

  <a href="index.html">
    <button>トップに戻る</button>
  </a>

</body>
</html>
