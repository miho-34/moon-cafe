<!DOCTYPE html>
<html>
<head>    
  <meta charset="UTF-8">
  <title>予約完了</title>
  <link rel="stylesheet" href="style.css">
  <style>
  body {
    background: linear-gradient(135deg, #f5e6dc, #d6b8a8);
    text-align: center;
    margin-top: 100px;
    font-family: sans-serif;
  }

  h1 {
    color: #6b4f3b;
    font-size: 40px;
    font-weight: 600;
}
  p {
    color: #7a5a44;
    font-size: 20px;
  }

  button {
    cursor: pointer;
    padding: 12px 28px;
    background: #6b4f3b;
    color: white;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    font-size: 18px;
    margin-top: 20px;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
button:hover {
  transform: scale(1.05) translateY(-2px);
  opacity: 0.95;
  box-shadow: 0 6px 14px rgba(0,0,0,0.25);
}

button:active {
  transform: scale(0.98);
}
</style>
</head>
<body>

<h1>予約完了しました</h1>
<p>ありがとうございます！</p>

<p>内容確認のうえご連絡いたします。</p>

<a href="index.html">
  <button>トップに戻る</button>
</a>

</body>
</html>
